version: '3.4'

services:
  catalogdb:
    container_name: catalogdb
    environment:
      - MYSQL_DATABASE=CatalogDb
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    restart: always
    ports:
      - "3301:3306"
    volumes:
      - mysql_catalog:/var/lib/mysql
  
  microcore.catalog.api:
    container_name: microcore.catalog.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__Database=Server=catalogdb;Port=3306;Database=CatalogDb;User=${MYSQL_USER};Password=${MYSQL_PASSWORD};
      - BusOption__Address=rabbitmq
      - BusOption__Port=5672
      - BusOption__UserName=${RABBITMQ_DEFAULT_USER}
      - BusOption__Password=${RABBITMQ_DEFAULT_PASS}
      - IdentityOption__Address=http://keycloak:8080/realms/MicroCoreTenant
      - IdentityOption__Issuer=http://localhost:8080/realms/MicroCoreTenant
      - IdentityOption__Audience=microcore-client
    ports:
      - "6000:8080"
      - "6060:8081"
    depends_on:
      - catalogdb
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  basketdb:
    container_name: basketdb
    environment:
      - MYSQL_DATABASE=BasketDb
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    restart: always
    ports:
      - "3302:3306" 
    volumes:
      - mysql_basket:/var/lib/mysql

  basketredis:
    container_name: basketredis
    restart: always
    ports:
      - "6379:6379" 
    volumes:
      - redis_basket:/data

  microcore.basket.api:
    container_name: microcore.basket.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__Database=Server=basketdb;Port=3306;Database=BasketDb;User=${MYSQL_USER};Password=${MYSQL_PASSWORD};
      - ConnectionStrings__Redis=basketredis:6379
      - AddressUrlOption__OrderUrl=http://microcore.order.api:8080
      - GrpcSettings__DiscountUrl=http://microcore.discount.grpc:8080
      - BusOption__Address=rabbitmq      
      - BusOption__Port=5672
      - BusOption__UserName=${RABBITMQ_DEFAULT_USER}
      - BusOption__Password=${RABBITMQ_DEFAULT_PASS}
      - IdentityOption__Address=http://keycloak:8080/realms/MicroCoreTenant
      - IdentityOption__Issuer=http://localhost:8080/realms/MicroCoreTenant
      - Logging__LogLevel__Microsoft.AspNetCore.Authentication=Debug
      - Logging__LogLevel__Microsoft.AspNetCore.Authorization=Debug
      - IdentityOption__Audience=microcore-client
    ports:
      - "6010:8080" 
      - "6061:8081" 
    depends_on:
      - basketdb
      - basketredis
      - rabbitmq
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  discountdb:
    container_name: discountdb
    environment:
      - MYSQL_DATABASE=DiscountDb
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    restart: always
    ports:
      - "3303:3306"
    volumes:
      - mysql_discount:/var/lib/mysql

  microcore.discount.grpc:
    container_name: microcore.discount.grpc
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__Database=Server=discountdb;Port=3306;Database=DiscountDb;User=${MYSQL_USER};Password=${MYSQL_PASSWORD};
    ports:
      - "6002:8080"
    depends_on:
      - discountdb
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  orderdb:
    container_name: orderdb
    environment:
      - MYSQL_DATABASE=OrderDb
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    restart: always
    ports:
      - "3304:3306"
    volumes:
      - mysql_order:/var/lib/mysql

  microcore.order.api:
    container_name: microcore.order.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__Database=Server=orderdb;Port=3306;Database=OrderDb;User=${MYSQL_USER};Password=${MYSQL_PASSWORD};
      - AddressUrlOption__PaymentUrl=http://microcore.payment.api:8080
      - BusOption__Address=rabbitmq      
      - BusOption__Port=5672
      - BusOption__UserName=${RABBITMQ_DEFAULT_USER}
      - BusOption__Password=${RABBITMQ_DEFAULT_PASS}
      - IdentityOption__Address=http://keycloak:8080/realms/MicroCoreTenant
      - IdentityOption__Issuer=http://localhost:8080/realms/MicroCoreTenant
      - IdentityOption__Audience=microcore-client
    ports:
      - "6003:8080"
      - "6063:8081"
    depends_on:
      - orderdb
      - rabbitmq
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  paymentdb:
    container_name: paymentdb
    environment:
      - MYSQL_DATABASE=PaymentDb
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    restart: always
    ports:
      - "3305:3306"
    volumes:
      - mysql_payment:/var/lib/mysql

  microcore.payment.api:
    container_name: microcore.payment.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__Database=Server=paymentdb;Port=3306;Database=PaymentDb;User=${MYSQL_USER};Password=${MYSQL_PASSWORD};
      - BusOption__Address=rabbitmq
      - IdentityOption__Address=http://keycloak:8080/realms/MicroCoreTenant
      - IdentityOption__Issuer=http://localhost:8080/realms/MicroCoreTenant
      - IdentityOption__Audience=microcore-client
    ports:
      - "6004:8080"
      - "6064:8081"
    depends_on:
      - paymentdb
      - rabbitmq
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  keycloakdb:
    container_name: keycloakdb
    environment:
      - MYSQL_DATABASE=KeycloakDb
      - MYSQL_USER=${MYSQL_USER} 
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD} 
    restart: always
    ports:
      - "3307:3306" 
    volumes:
      - mysql_keycloak_data:/var/lib/mysql 

  keycloak:
    container_name: keycloak
    environment:
      - KC_HOSTNAME_PORT=8080
      - KC_HOSTNAME_STRICT_BACKCHANNEL=false
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HOSTNAME_STRICT=false
      - KC_HEALTH_ENABLED=true
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=mysql 
      - KC_DB_URL=jdbc:mysql://keycloakdb:3306/KeycloakDb?characterEncoding=UTF-8
      - KC_DB_USERNAME=${MYSQL_USER}
      - KC_DB_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - keycloakdb
 
  rabbitmq:
    container_name: rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"   
      - "15672:15672" 
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  microcore.gateway:
    container_name: microcore.gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ReverseProxy__Routes__basket.route__ClusterId=basket.cluster
      - ReverseProxy__Routes__basket.route__Match__Path=/api/baskets/{**catch-all}

      - ReverseProxy__Routes__catalog.route__ClusterId=catalog.cluster
      - ReverseProxy__Routes__catalog.route__Match__Path=/api/catalogs/{**catch-all}

      - ReverseProxy__Routes__order.route__ClusterId=order.cluster
      - ReverseProxy__Routes__order.route__Match__Path=/api/orders/{**catch-all}

      - ReverseProxy__Routes__payment.route__ClusterId=payment.cluster
      - ReverseProxy__Routes__payment.route__Match__Path=/api/payments/{**catch-all}

      - ReverseProxy__Routes__discount.route__ClusterId=discount.cluster
      - ReverseProxy__Routes__discount.route__Match__Path=/api/discounts/{**catch-all}

      - ReverseProxy__Clusters__basket.cluster__Destinations__destination1__Address=http://microcore.basket.api:8080
      - ReverseProxy__Clusters__catalog.cluster__Destinations__destination1__Address=http://microcore.catalog.api:8080
      - ReverseProxy__Clusters__discount.cluster__Destinations__destination1__Address=http://microcore.discount.grpc:8080
      - ReverseProxy__Clusters__file.cluster__Destinations__destination1__Address=http://microcore.catalog.api:8080
      - ReverseProxy__Clusters__order.cluster__Destinations__destination1__Address=http://microcore.order.api:8080
      - ReverseProxy__Clusters__payment.cluster__Destinations__destination1__Address=http://microcore.payment.api:8080
    ports:
      - "5000:8080"
    depends_on:
      - microcore.catalog.api
      - microcore.basket.api
      - microcore.order.api
      - keycloak
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro