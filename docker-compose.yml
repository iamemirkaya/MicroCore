version: '3.4'

services:
  catalogdb: 
    image: postgres:latest

  microcore.catalog.api:
    image: ${DOCKER_REGISTRY-}microcorecatalogapi
    build:
      context: .
      dockerfile: src/Services/Catalog/MicroCore.Catalog.API/Dockerfile

  basketdb:
    image: postgres:latest

  basketredis:
    image: redis:alpine

  microcore.basket.api:
    image: ${DOCKER_REGISTRY-}microcorebasketapi
    build:
      context: .
      dockerfile: src/Services/Basket/MicroCore.Basket.Api/Dockerfile
  
  microcore.discount.grpc:
    image: ${DOCKER_REGISTRY-}microcorediscountgrpc
    build:
      context: .
      dockerfile: src/Services/Discount/MicroCore.Discount.Grpc/Dockerfile


volumes:
  postgres_catalog:
  postgres_basket:
  redis_basket:
  sqlite_discount:
